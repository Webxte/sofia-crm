
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="A CRM system with offline capabilities" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>CRM</title>
    <script>
      // Ensure React is defined globally as early as possible
      window.React = {};
      console.log("React defined in head:", window.React);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Verify React is still defined before scripts load
      console.log("React check before scripts:", window.React);
    </script>
    <script src="https://cdn.gpteng.co/gptengineer.js" type="module"></script>
    <!-- Force fresh load with timestamp -->
    <script type="module" src="/src/main.tsx?v=<?= Date.now() ?>"></script>
    <script>
      // Register service worker for offline support
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(registration => {
            console.log('Service Worker registered:', registration);
          }).catch(error => {
            console.log('Service Worker registration failed:', error);
          });
        });
      }
    </script>
  </body>
</html>
