
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="A CRM system with offline capabilities" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>CRM</title>
    <script>
      // Define window.React as a placeholder object before any scripts load
      // This ensures React is available before any code tries to access it
      window.React = window.React || {};
      console.log("Initial React setup in head:", window.React);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Double-check React is defined before script loading
      console.log("Pre-script React check:", window.React);
    </script>
    <script src="https://cdn.gpteng.co/gptengineer.js" type="module"></script>
    <!-- Add cache-busting timestamp to ensure fresh React code -->
    <script type="module" src="/src/main.tsx?t=<?= Date.now() ?>"></script>
    <script>
      // Register service worker for offline support
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(registration => {
            console.log('Service Worker registered:', registration);
          }).catch(error => {
            console.log('Service Worker registration failed:', error);
          });
        });
      }
    </script>
  </body>
</html>
