
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="A CRM system with offline capabilities" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>CRM</title>
    <!-- Load React directly from CDN before any other scripts, make sure to use specific versions -->
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script>
      // Verify React is loaded properly and attach it to window
      console.log("React version loaded in head:", React?.version || "NOT LOADED");
      console.log("useState hook available:", typeof React?.useState === 'function' ? "YES" : "NO");
      console.log("useCallback hook available:", typeof React?.useCallback === 'function' ? "YES" : "NO");
      
      // Make sure React is globally available
      window.React = React;
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Verify React is still defined before scripts load
      console.log("React check before scripts:", window.React ? "AVAILABLE" : "NOT AVAILABLE");
      console.log("useState hook still available:", typeof window.React?.useState === 'function' ? "YES" : "NO");
    </script>
    <!-- Add the GPT Engineer script for Lovable features -->
    <script src="https://cdn.gpteng.co/gptengineer.js" type="module"></script>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register service worker for offline support
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(registration => {
            console.log('Service Worker registered:', registration);
          }).catch(error => {
            console.log('Service Worker registration failed:', error);
          });
        });
      }
    </script>
  </body>
</html>
